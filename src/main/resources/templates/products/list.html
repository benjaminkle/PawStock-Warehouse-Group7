<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Products | PawStock Warehouse</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
      <!-- Successful create, update, or delete message -->
      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${successMessage}"></span>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>

      <header
        class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"
      >
        <div>
          <h1>Product Inventory</h1>

          <p class="text-secondary mb-0">
            Search, filter and sort saved products.
          </p>
        </div>

        <!-- Only Staff and Admin can add products -->
        <a
          th:href="@{/products/new}"
          class="btn btn-primary"
          sec:authorize="hasAnyRole('STAFF', 'ADMIN')"
        >
          Add Product
        </a>
      </header>

      <!-- Search, filter, and sorting form -->
      <section class="filter-card mb-4">
        <form th:action="@{/products}" method="get" class="row g-3">
          <div class="col-lg-3">
            <label for="keyword" class="form-label"> Product Name </label>

            <input
              id="keyword"
              name="keyword"
              type="search"
              class="form-control"
              th:value="${keyword}"
              placeholder="Search products"
            />
          </div>

          <div class="col-md-4 col-lg-2">
            <label for="brandId" class="form-label"> Brand </label>

            <select id="brandId" name="brandId" class="form-select">
              <option value="">All brands</option>

              <option
                th:each="brand : ${brands}"
                th:value="${brand.brandId}"
                th:text="${brand.brandName}"
                th:selected="${brand.brandId == selectedBrandId}"
              ></option>
            </select>
          </div>

          <div class="col-md-4 col-lg-2">
            <label for="categoryId" class="form-label"> Category </label>

            <select id="categoryId" name="categoryId" class="form-select">
              <option value="">All categories</option>

              <option
                th:each="category : ${categories}"
                th:value="${category.categoryId}"
                th:text="${category.categoryName}"
                th:selected="${category.categoryId == selectedCategoryId}"
              ></option>
            </select>
          </div>

          <div class="col-md-4 col-lg-2">
            <label for="petType" class="form-label"> Pet Type </label>

            <select id="petType" name="petType" class="form-select">
              <option value="">All pet types</option>

              <option
                th:each="type : ${petTypes}"
                th:value="${type}"
                th:text="${type}"
                th:selected="${type == selectedPetType}"
              ></option>
            </select>
          </div>

          <div class="col-md-6 col-lg-2">
            <label for="sortField" class="form-label"> Sort By </label>

            <select id="sortField" name="sortField" class="form-select">
              <option
                value="productName"
                th:selected="${sortField == 'productName'}"
              >
                Name
              </option>

              <option value="quantity" th:selected="${sortField == 'quantity'}">
                Quantity
              </option>

              <option value="price" th:selected="${sortField == 'price'}">
                Price
              </option>

              <option
                value="brand.brandName"
                th:selected="${sortField == 'brand.brandName'}"
              >
                Brand
              </option>

              <option
                value="category.categoryName"
                th:selected="${sortField == 'category.categoryName'}"
              >
                Category
              </option>

              <option
                value="createdAt"
                th:selected="${sortField == 'createdAt'}"
              >
                Date Added
              </option>
            </select>
          </div>

          <div class="col-md-6 col-lg-1">
            <label for="sortDirection" class="form-label"> Order </label>

            <select id="sortDirection" name="sortDirection" class="form-select">
              <option value="asc" th:selected="${sortDirection == 'asc'}">
                ASC
              </option>

              <option value="desc" th:selected="${sortDirection == 'desc'}">
                DESC
              </option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-dark">Apply</button>

            <a th:href="@{/products}" class="btn btn-outline-secondary">
              Reset
            </a>
          </div>
        </form>
      </section>

      <!-- Product table -->
      <section class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th
                th:classappend="${sortField == 'productName'
                ? 'sort-active ' + sortDirection
                : ''}"
              >
                Product
              </th>

              <th
                th:classappend="${sortField == 'quantity'
                ? 'sort-active ' + sortDirection
                : ''}"
              >
                Quantity
              </th>

              <th>Pet Type</th>

              <th
                th:classappend="${sortField == 'brand.brandName'
                ? 'sort-active ' + sortDirection
                : ''}"
              >
                Brand
              </th>

              <th
                th:classappend="${sortField == 'category.categoryName'
                ? 'sort-active ' + sortDirection
                : ''}"
              >
                Category
              </th>

              <th
                th:classappend="${sortField == 'price'
                ? 'sort-active ' + sortDirection
                : ''}"
              >
                Price
              </th>

              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="product : ${products}">
              <td>
                <strong th:text="${product.productName}"> Product </strong>

                <div
                  class="small text-secondary"
                  th:text="${product.size}"
                ></div>
              </td>

              <td>
                <span
                  class="badge"
                  th:text="${product.quantity}"
                  th:classappend="${product.quantity < 10}
                  ? 'text-bg-danger'
                  : 'text-bg-success'"
                ></span>
              </td>

              <td th:text="${product.petType}">Dog</td>

              <td th:text="${product.brand.brandName}">Brand</td>

              <td th:text="${product.category.categoryName}">Category</td>

              <td
                th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"
              >
                $0.00
              </td>

              <td>
                <div class="d-flex flex-wrap gap-2">
                  <!-- Every authenticated role can view -->
                  <a
                    class="btn btn-sm btn-outline-primary"
                    th:href="@{/products/{id}(id=${product.productId})}"
                  >
                    View
                  </a>

                  <!-- Only Staff and Admin can edit -->
                  <a
                    class="btn btn-sm btn-outline-dark"
                    th:href="@{/products/{id}/edit(id=${product.productId})}"
                    sec:authorize="hasAnyRole('STAFF', 'ADMIN')"
                  >
                    Edit
                  </a>

                  <!-- Only Admin can delete -->
                  <form
                    th:action="@{/products/{id}/delete(id=${product.productId})}"
                    method="post"
                    class="d-inline"
                    sec:authorize="hasRole('ADMIN')"
                    onsubmit="
                      return confirm(
                        'Are you sure you want to delete this product?',
                      );
                    "
                  >
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                      Delete
                    </button>
                  </form>
                </div>
              </td>
            </tr>

            <!-- Empty result message -->
            <tr th:if="${#lists.isEmpty(products)}">
              <td colspan="7" class="text-center py-5">
                <h2 class="h5">No products found</h2>

                <p class="text-secondary mb-0">
                  Try changing the search or filter values.
                </p>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- Pagination -->
      <nav
        th:if="${productPage.totalPages > 1}"
        aria-label="Product pages"
        class="mt-4"
      >
        <ul class="pagination justify-content-center">
          <li
            class="page-item"
            th:classappend="${productPage.first} ? 'disabled' : ''"
          >
            <a
              class="page-link"
              th:href="@{/products(
              page=${productPage.number - 1},
              keyword=${keyword},
              brandId=${selectedBrandId},
              categoryId=${selectedCategoryId},
              petType=${selectedPetType},
              sortField=${sortField},
              sortDirection=${sortDirection}
            )}"
            >
              Previous
            </a>
          </li>

          <li
            class="page-item"
            th:each="pageNumber : ${#numbers.sequence(
            0,
            productPage.totalPages - 1
          )}"
            th:classappend="${pageNumber == productPage.number}
            ? 'active'
            : ''"
          >
            <a
              class="page-link"
              th:text="${pageNumber + 1}"
              th:href="@{/products(
              page=${pageNumber},
              keyword=${keyword},
              brandId=${selectedBrandId},
              categoryId=${selectedCategoryId},
              petType=${selectedPetType},
              sortField=${sortField},
              sortDirection=${sortDirection}
            )}"
            >
              1
            </a>
          </li>

          <li
            class="page-item"
            th:classappend="${productPage.last} ? 'disabled' : ''"
          >
            <a
              class="page-link"
              th:href="@{/products(
              page=${productPage.number + 1},
              keyword=${keyword},
              brandId=${selectedBrandId},
              categoryId=${selectedCategoryId},
              petType=${selectedPetType},
              sortField=${sortField},
              sortDirection=${sortDirection}
            )}"
            >
              Next
            </a>
          </li>
        </ul>
      </nav>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
