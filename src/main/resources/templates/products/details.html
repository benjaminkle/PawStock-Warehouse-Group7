<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Product Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body class="d-flex flex-column min-vh-100">
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <article class="details-card">
      <span class="badge text-bg-primary mb-3" th:text="${product.petType}">
        Pet Type
      </span>

      <h1 th:text="${product.productName}">Product Name</h1>

      <p class="lead text-secondary" th:text="${product.description}">
        Product description
      </p>

      <div class="bg-light rounded p-4 mt-4">
        <div class="row g-4">
          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Price</h2>

            <p class="fs-4 fw-bold" th:text="${'$'
                         + #numbers.formatDecimal(
                             product.price, 1, 2)}">
              $0.00
            </p>
          </div>

          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Size</h2>

            <p th:text="${product.size != null
                      ? product.size : 'Not specified'}"></p>
          </div>

          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Quantity</h2>

            <p>
              <span class="badge"
                    th:text="${product.quantity}"
                    th:classappend="${product.quantity < 10} ? 'text-bg-danger' : 'text-bg-success'">
              </span>
            </p>
          </div>

          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Brand</h2>

            <p th:text="${product.brand.brandName}"></p>
          </div>

          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Category</h2>

            <p th:text="${product.category.categoryName}"></p>
          </div>

          <div class="col-md-4">
            <h2 class="h6 text-uppercase text-secondary">Supplier</h2>

            <p th:text="${product.supplier.supplierName}"></p>
          </div>

          <div class="col-12">
            <h2 class="text-uppercase text-secondary small">Created At</h2>

            <p class="text-secondary small" th:text="${#temporals.format(product.createdAt, 'MMMM dd, yyyy h:mm a')}"></p>
          </div>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mt-4">
        <a th:href="@{/products}" class="btn btn-primary">
          Back to Products
        </a>

        <a th:href="@{/products/{id}/edit(id=${product.productId})}" class="btn btn-outline-dark">
          Edit Product
        </a>

        <form th:action="@{/products/{id}/delete(id=${product.productId})}" method="post"
          onsubmit="return confirm('Are you sure you want to delete this product?');">
          <button type="submit" class="btn btn-outline-danger">
            Delete Product
          </button>
        </form>

        <a th:href="@{/products/new}" class="btn btn-outline-secondary">
          Add Another
        </a>
      </div>
    </article>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
