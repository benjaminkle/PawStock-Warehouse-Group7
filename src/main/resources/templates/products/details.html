<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Product Details | PawStock Warehouse</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
      <!-- Success message after creating or updating a product -->
      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${successMessage}"></span>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>

      <article class="details-card">
        <span class="badge text-bg-primary mb-3" th:text="${product.petType}">
          Pet Type
        </span>

        <h1 th:text="${product.productName}">Product Name</h1>

        <p class="lead text-secondary" th:text="${product.description}">
          Product description
        </p>

        <div class="bg-light rounded p-4 mt-4">
          <div class="row g-4">
            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Price</h2>

              <p
                class="fs-4 fw-bold"
                th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"
              >
                $0.00
              </p>
            </div>

            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Size</h2>

              <p
                th:text="${product.size != null && !product.size.isBlank()
                ? product.size
                : 'Not specified'}"
              >
                Not specified
              </p>
            </div>

            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Quantity</h2>

              <p>
                <span
                  class="badge"
                  th:text="${product.quantity}"
                  th:classappend="${product.quantity < 10}
                  ? 'text-bg-danger'
                  : 'text-bg-success'"
                >
                  0
                </span>
              </p>
            </div>

            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Brand</h2>

              <p th:text="${product.brand.brandName}">Brand</p>
            </div>

            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Category</h2>

              <p th:text="${product.category.categoryName}">Category</p>
            </div>

            <div class="col-md-4">
              <h2 class="h6 text-uppercase text-secondary">Supplier</h2>

              <p th:text="${product.supplier.supplierName}">Supplier</p>
            </div>

            <div class="col-12">
              <h2 class="text-uppercase text-secondary small">Created At</h2>

              <p
                class="text-secondary small mb-0"
                th:text="${#temporals.format(
                product.createdAt,
                'MMMM dd, yyyy h:mm a'
              )}"
              >
                January 01, 2026 12:00 PM
              </p>
            </div>
          </div>
        </div>

        <!-- Role-based product actions -->
        <div class="d-flex flex-wrap gap-2 mt-4">
          <!-- Customer, Staff, and Admin can return to the list -->
          <a th:href="@{/products}" class="btn btn-primary">
            Back to Products
          </a>

          <!-- Only Staff and Admin can edit products -->
          <a
            th:href="@{/products/{id}/edit(id=${product.productId})}"
            class="btn btn-outline-dark"
            sec:authorize="hasAnyRole('STAFF', 'ADMIN')"
          >
            Edit Product
          </a>

          <!-- Only Admin can delete products -->
          <form
            th:action="@{/products/{id}/delete(id=${product.productId})}"
            method="post"
            class="d-inline"
            sec:authorize="hasRole('ADMIN')"
            onsubmit="
              return confirm('Are you sure you want to delete this product?');
            "
          >
            <button type="submit" class="btn btn-outline-danger">
              Delete Product
            </button>
          </form>

          <!-- Only Staff and Admin can add another product -->
          <a
            th:href="@{/products/new}"
            class="btn btn-outline-secondary"
            sec:authorize="hasAnyRole('STAFF', 'ADMIN')"
          >
            Add Another
          </a>
        </div>
      </article>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
