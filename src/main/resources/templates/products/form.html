<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title th:text="${isEdit} ? 'Edit Product' : 'Add Product'">
    Product Form
  </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body class="d-flex flex-column min-vh-100">
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <header class="mb-4">
          <h1 th:text="${isEdit} ? 'Edit Product' : 'Add a Product'">
            Product Form
          </h1>

          <p class="text-secondary" th:text="${isEdit}
                ? 'Update the saved product information.'
                : 'Enter the new pet supply product information.'">
            Enter the product information.
          </p>
        </header>

        <section class="form-card">
          <form th:action="${isEdit}
                ? @{/products/{id}(id=${productId})}
                : @{/products}" th:object="${productForm}" method="post" novalidate>
            <div class="mb-3">
              <label for="productName" class="form-label">
                Product Name
              </label>

              <input id="productName" type="text" class="form-control" th:field="*{productName}" th:classappend="${#fields.hasErrors('productName')}
                                   ? 'is-invalid' : ''" />

              <div class="invalid-feedback" th:errors="*{productName}"></div>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">
                Description
              </label>

              <textarea id="description" class="form-control" rows="4" th:field="*{description}" th:classappend="${#fields.hasErrors('description')}
                                      ? 'is-invalid' : ''">
                </textarea>

              <div class="invalid-feedback" th:errors="*{description}"></div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="price" class="form-label"> Price </label>

                <input id="price" type="number" step="0.01" min="0.01" class="form-control" th:field="*{price}"
                  th:classappend="${#fields.hasErrors('price')}
                                       ? 'is-invalid' : ''" />

                <div class="invalid-feedback" th:errors="*{price}"></div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="size" class="form-label"> Size </label>

                <input id="size" type="text" class="form-control" th:field="*{size}" placeholder="Example: 5 kg" />

                <div class="invalid-feedback" th:errors="*{size}"></div>
              </div>
            </div>

            <div class="mb-3">
              <label for="petType" class="form-label"> Pet Type </label>

              <select id="petType" class="form-select" th:field="*{petType}" th:classappend="${#fields.hasErrors('petType')}
                                    ? 'is-invalid' : ''">
                <option value="">Select a pet type</option>

                <option th:each="type : ${petTypes}" th:value="${type}" th:text="${type}"></option>
              </select>

              <div class="invalid-feedback" th:errors="*{petType}"></div>
            </div>

            <div class="row">
              <div class="col-md-4 mb-3">
                <label for="brandId" class="form-label"> Brand </label>

                <select id="brandId" class="form-select" th:field="*{brandId}" th:classappend="${#fields.hasErrors('brandId')}
                                        ? 'is-invalid' : ''">
                  <option value="">Select brand</option>

                  <option th:each="brand : ${brands}" th:value="${brand.brandId}" th:text="${brand.brandName}"></option>
                </select>

                <div class="invalid-feedback" th:errors="*{brandId}"></div>
              </div>

              <div class="col-md-4 mb-3">
                <label for="categoryId" class="form-label"> Category </label>

                <select id="categoryId" class="form-select" th:field="*{categoryId}" th:classappend="${#fields.hasErrors('categoryId')}
                                        ? 'is-invalid' : ''">
                  <option value="">Select category</option>

                  <option th:each="category : ${categories}" th:value="${category.categoryId}"
                    th:text="${category.categoryName}"></option>
                </select>

                <div class="invalid-feedback" th:errors="*{categoryId}"></div>
              </div>

              <div class="col-md-4 mb-3">
                <label for="supplierId" class="form-label"> Supplier </label>

                <select id="supplierId" class="form-select" th:field="*{supplierId}" th:classappend="${#fields.hasErrors('supplierId')}
                                        ? 'is-invalid' : ''">
                  <option value="">Select supplier</option>

                  <option th:each="supplier : ${suppliers}" th:value="${supplier.supplierId}"
                    th:text="${supplier.supplierName}"></option>
                </select>

                <div class="invalid-feedback" th:errors="*{supplierId}"></div>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Product' : 'Save Product'">
                Save Product
              </button>

              <a th:href="${isEdit}
                    ? @{/products/{id}(id=${productId})}
                    : @{/products}" class="btn btn-outline-secondary">
                Cancel
              </a>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
