<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg navbar-dark bg-dark"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"> PawStock Warehouse </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNavbar" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active' : ''"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/products}" th:classappend="${activePage == 'products'} ? 'active' : ''"> Products </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/products/new}" th:classappend="${activePage == 'addProduct'} ? 'active' : ''"> Add Product </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/warehouse}" th:classappend="${activePage == 'warehouse'} ? 'active' : ''"> Warehouse </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/about}" th:classappend="${activePage == 'about'} ? 'active' : ''"> About </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/roadmap}" th:classappend="${activePage == 'roadmap'} ? 'active' : ''"> Roadmap </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </body>
</html>
