<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register | PawStock Warehouse</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 text-center mb-4">Create an Account</h1>

              <!-- Registration service error -->
              <div
                th:if="${registrationError}"
                class="alert alert-danger"
                th:text="${registrationError}"
              ></div>

              <form
                th:action="@{/register}"
                th:object="${registrationForm}"
                method="post"
              >
                <!-- Full name -->
                <div class="mb-3">
                  <label for="fullName" class="form-label"> Full Name </label>

                  <input
                    type="text"
                    id="fullName"
                    class="form-control"
                    th:field="*{fullName}"
                    th:classappend="${#fields.hasErrors('fullName')}
                                           ? 'is-invalid' : ''"
                  />

                  <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>

                <!-- Username -->
                <div class="mb-3">
                  <label for="username" class="form-label"> Username </label>

                  <input
                    type="text"
                    id="username"
                    class="form-control"
                    th:field="*{username}"
                    th:classappend="${#fields.hasErrors('username')}
                                           ? 'is-invalid' : ''"
                  />

                  <div class="invalid-feedback" th:errors="*{username}"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label"> Email </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    th:field="*{email}"
                    th:classappend="${#fields.hasErrors('email')}
                                           ? 'is-invalid' : ''"
                  />

                  <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label for="password" class="form-label"> Password </label>

                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    th:field="*{password}"
                    th:classappend="${#fields.hasErrors('password')}
                                           ? 'is-invalid' : ''"
                  />

                  <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>

                <!-- Confirm password -->
                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">
                    Confirm Password
                  </label>

                  <input
                    type="password"
                    id="confirmPassword"
                    class="form-control"
                    th:field="*{confirmPassword}"
                    th:classappend="${#fields.hasErrors('confirmPassword')}
                                           ? 'is-invalid' : ''"
                  />

                  <div
                    class="invalid-feedback"
                    th:errors="*{confirmPassword}"
                  ></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Register
                </button>
                <div class="d-grid gap-2 mt-3">
                  <a th:href="@{/}" class="btn btn-outline-secondary">
                    ← Back to Home
                  </a>
                </div>
              </form>

              <p class="text-center mt-4 mb-0">
                Already have an account?

                <a th:href="@{/login}"> Login here </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
