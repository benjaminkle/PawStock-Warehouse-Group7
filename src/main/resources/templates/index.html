<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>PawStock Warehouse</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main>
      <section class="hero-section py-5">
        <div class="container py-4">
          <div class="row align-items-center">
            <div class="col-lg-7">
              <span class="badge text-bg-warning mb-3">
                Pet supply inventory management
              </span>

              <h1 class="display-4 fw-bold">
                Manage pet products with PawStock
              </h1>

              <p class="lead text-secondary">
                Track products, brands, categories and suppliers through one
                organized warehouse application.
              </p>

              <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/products}" class="btn btn-primary btn-lg">
                  Browse Products
                </a>

                <a
                  th:href="@{/products/new}"
                  class="btn btn-outline-dark btn-lg"
                >
                  Add Product
                </a>
              </div>
            </div>

            <div class="col-lg-5 mt-4 mt-lg-0">
              <div class="p-4">
                <img class="w-50" th:src="@{/media/paw.gif}" alt="Paw">
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="container py-5">
        <h2 class="mb-4">Warehouse Overview</h2>

        <div class="row g-4">
          <div class="col-sm-6 col-lg-3">
            <div class="dashboard-card">
              <p class="dashboard-number" th:text="${productCount}">0</p>
              <p class="mb-0">Products</p>
            </div>
          </div>

          <div class="col-sm-6 col-lg-3">
            <div class="dashboard-card">
              <p class="dashboard-number" th:text="${brandCount}">0</p>
              <p class="mb-0">Brands</p>
            </div>
          </div>

          <div class="col-sm-6 col-lg-3">
            <div class="dashboard-card">
              <p class="dashboard-number" th:text="${categoryCount}">0</p>
              <p class="mb-0">Categories</p>
            </div>
          </div>

          <div class="col-sm-6 col-lg-3">
            <div class="dashboard-card">
              <p class="dashboard-number" th:text="${supplierCount}">0</p>
              <p class="mb-0">Suppliers</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
